<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calcul Prix Net Perros - Multi-Plateforme</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f9;
            margin: 0;
            padding: 0;
        }
        .container {
            width: 90%;
            max-width: 800px;
            margin: 40px auto;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #4CAF50;
            margin-top: 0;
        }
        label {
            font-size: 16px;
            margin-top: 15px;
            display: block;
        }
        select, input {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            font-size: 16px;
            border-radius: 5px;
            border: 1px solid #ccc;
            box-sizing: border-box;
        }
        button {
            margin-top: 20px;
            width: 100%;
            padding: 12px;
            background: #4CAF50;
            color: white;
            border: none;
            font-size: 18px;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background: #45a049;
        }
        .result {
            margin-top: 25px;
            padding: 20px;
            background: #f9f9f9;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.05);
        }
        .result h3 {
            margin-top: 15px;
            margin-bottom: 8px;
        }
        .highlight {
            color: red;
            font-weight: bold;
        }
        hr {
            margin: 12px 0;
            border: none;
            border-top: 1px solid #ddd;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>Calcul du Prix Net - Perros</h1>

    <label for="plateforme">Plateforme :</label>
    <select id="plateforme">
        <option value="booking">Booking</option>
        <option value="airbnb">Airbnb</option>
        <option value="direct">Direct</option>
    </select>

    <label for="prixTTC2p">Prix TTC pour 2 personnes (sans annulation) :</label>
    <input type="number" id="prixTTC2p" step="0.01">

    <button onclick="calculer()">Calculer</button>

    <div class="result" id="result"></div>
</div>

<script>
    const tauxTaxe = 0.05;
    const plafondTaxe = 4.20;
    const tauxTaxeDepartementale = 0.10;

    function taxeSejour(prixNet, adultes) {
        let taxe = prixNet * tauxTaxe;
        taxe = Math.min(taxe, adultes * plafondTaxe);
        return taxe + taxe * tauxTaxeDepartementale;
    }

    function calculer() {
        const prixTTC2p = parseFloat(document.getElementById("prixTTC2p").value);
        const plateforme = document.getElementById("plateforme").value;
        
        // Vérifier que le prix TTC pour 2 personnes est fourni
        if (isNaN(prixTTC2p) || prixTTC2p <= 0) {
            alert("Veuillez entrer un prix TTC valide pour 2 personnes sans annulation.");
            return;
        }

        // Calculer le prix net pour 2 personnes sans annulation
        let prixNet2p = prixTTC2p / (1 + tauxTaxe + tauxTaxe * tauxTaxeDepartementale);

        // Calculer la taxe de séjour pour 2 personnes sans annulation
        let taxeSejour2p = prixNet2p * tauxTaxe;

        // Vérifier si la taxe de séjour dépasse ou est égale à 2 * 4.20€
        if (taxeSejour2p >= 2 * plafondTaxe) {
            // Si la taxe de séjour dépasse le seuil (8.40€), appliquer le plafond
            prixNet2p = prixTTC2p - (2 * plafondTaxe * (1 + tauxTaxeDepartementale));
        } else {
            // Sinon, calculer le prix net sans dépasser la taxe de séjour
            prixNet2p = prixTTC2p / (1 + tauxTaxe + tauxTaxe * tauxTaxeDepartementale);
        }

        // Prix net 4P (base commune)
        let prixNet4p = prixNet2p;

        // Taxe séjour 4P
        let taxe4p = taxeSejour(prixNet4p, 4);

        let prixFinal;
        let details = "";

        // -------------------------
        //       BOOKING
        // -------------------------
        if (plateforme === "booking") {

            let prixNet2pAnnul = prixNet2p / 0.9;
            let prixNet4pAnnul = prixNet2pAnnul / 0.85;

            prixFinal = prixNet4pAnnul;

            let taxe4p = taxeSejour(prixFinal, 4);

            details = `
                <h3>Détails Booking</h3>
                <p>Prix net 2P : €${prixNet2p.toFixed(2)}</p>
                <p>Prix net 2P avec annulation (/0.9) : €${prixNet2pAnnul.toFixed(2)}</p>
                <p>Prix net 4P avec annulation (/0.85) : €${prixNet4pAnnul.toFixed(2)}</p>
                <p>Taxe de séjour 4P : €${taxe4p.toFixed(2)}</p>
            `;
        }
        // -------------------------
        //        AIRBNB
        // -------------------------
        if (plateforme === "airbnb") {

            const commissionHote = 0.03;      // 3% sur l'hôte
            const commissionVoyageur = 0.142; // 14.2% sur le prix hôte

            // Prix client 2P (valeur saisie)
            const prixClient2p = prixTTC2p;

            // Prix hôte TTC 2P (ce que tu vends réellement la chambre, base taxe)
            const prixHote2pTTC = prixClient2p / (1 + commissionVoyageur);

            // Prix net 2P à partir du TTC hôte (sans part client)
            let prixNet2pAirbnb = prixHote2pTTC / (1 + tauxTaxe + tauxTaxe * tauxTaxeDepartementale);

            // Plafond taxe 2P (toujours sur la base hôte)
            let taxeSejour2pAirbnb = prixNet2pAirbnb * tauxTaxe;
            if (taxeSejour2pAirbnb >= 2 * plafondTaxe) {
                prixNet2pAirbnb = prixHote2pTTC - (2 * plafondTaxe * (1 + tauxTaxeDepartementale));
            }

            // On garde la même base pour 4P (comme ton script Booking)
            let prixNet4pAirbnb = prixNet2pAirbnb;

            // Taxe de séjour 4P (calculée sur le prix hôte, pas sur la part client)
            let taxe4p = taxeSejour(prixNet4pAirbnb, 4);

            // Prix hôte TTC 4P (base Airbnb)
            const prixHote4pTTC = prixNet4pAirbnb + taxe4p;

            // Payout hôte après commission 3%
            const payoutHote = prixHote4pTTC * (1 - commissionHote);

            // Prix client final 4P (affiché sur Airbnb)
            const prixClient4p = prixHote4pTTC * (1 + commissionVoyageur);

            prixFinal = prixClient4p;

            details = `
                <h3>Détails Airbnb</h3>
                <p><strong>Prix client saisi (2P) :</strong> €${prixClient2p.toFixed(2)}</p>
                <p>Prix hôte TTC 2P (base taxe) : €${prixHote2pTTC.toFixed(2)}</p>
                <p>Prix net 2P : €${prixNet2pAirbnb.toFixed(2)}</p>
                <hr>
                <p>Prix net 4P : €${prixNet4pAirbnb.toFixed(2)}</p>
                <p>Taxe de séjour 4P (base hôte) : €${taxe4p.toFixed(2)}</p>
                <p>Prix hôte TTC 4P : €${prixHote4pTTC.toFixed(2)}</p>
                <p>Commission hôte 3% : -€${(prixHote4pTTC * commissionHote).toFixed(2)}</p>
                <p><strong>Payout hôte :</strong> €${payoutHote.toFixed(2)}</p>
                <hr>
                <p>Commission voyageur 14.2% : +€${(prixHote4pTTC * commissionVoyageur).toFixed(2)}</p>
                <p><strong>Prix client final 4P (affiché sur Airbnb) :</strong> €${prixClient4p.toFixed(2)}</p>
            `;
        }


        // -------------------------
        //        DIRECT
        // -------------------------
        if (plateforme === "direct") {

            prixFinal = prixNet4p;

            details = `
                <h3>Détails Direct</h3>
                <p>Prix net 4P : €${prixNet4p.toFixed(2)}</p>
                <p>Aucune commission appliquée.</p>
                <p><strong>Prix final :</strong> €${prixNet4p.toFixed(2)}</p>
                <p>Taxe de séjour 4P : €${taxe4p.toFixed(2)}</p>
            `;
        }

        document.getElementById("result").innerHTML = `
            <p><strong>Plateforme :</strong> ${plateforme.toUpperCase()}</p>
            <p><strong>Prix final à afficher :</strong> <span class="highlight">€${prixFinal.toFixed(2)}</span></p>
            <p><strong>Taxe de séjour (2 pers) :</strong> €${taxe4p.toFixed(2)}</p>
            <hr>
            ${details}
        `;
    }
</script>

</body>
</html>
