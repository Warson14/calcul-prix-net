<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calcul Prix Net Perros - Multi-Plateforme</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f9;
            margin: 0;
            padding: 0;
        }
        .container {
            width: 90%;
            max-width: 800px;
            margin: 40px auto;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #4CAF50;
            margin-top: 0;
        }
        label {
            font-size: 16px;
            margin-top: 15px;
            display: block;
        }
        select, input {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            font-size: 16px;
            border-radius: 5px;
            border: 1px solid #ccc;
            box-sizing: border-box;
        }
        button {
            margin-top: 20px;
            width: 100%;
            padding: 12px;
            background: #4CAF50;
            color: white;
            border: none;
            font-size: 18px;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background: #45a049;
        }
        .result {
            margin-top: 25px;
            padding: 20px;
            background: #f9f9f9;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.05);
        }
        .result h3 {
            margin-top: 15px;
            margin-bottom: 8px;
        }
        .highlight {
            color: red;
            font-weight: bold;
        }
        hr {
            margin: 12px 0;
            border: none;
            border-top: 1px solid #ddd;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>Calcul du Prix Net - Perros</h1>

    <label for="plateforme">Plateforme :</label>
    <select id="plateforme">
        <option value="booking">Booking</option>
        <option value="airbnb">Airbnb</option>
        <option value="direct">Direct</option>
    </select>

    <label for="prixTTC2p">Prix TTC pour 2 personnes (sans annulation) :</label>
    <input type="number" id="prixTTC2p" step="0.01">

    <button onclick="calculer()">Calculer</button>

    <div class="result" id="result"></div>
</div>

<script>
    // Récupération des paramètres depuis pricing.json
    const VILLE = "Perros";

    //const taxeCfg = CONFIG.taxe_sejour[VILLE];
    const tauxTaxe = 0.05;                 // ex: 0.05
    const plafondTaxe = 4.20;               // ex: 4.20
    const tauxTaxeDepartementale = 0.10; // ex: 1.10 -> 0.10

    function taxeSejour(prixNet, adultes) {
        let taxe = prixNet * tauxTaxe;
        taxe = Math.min(taxe, adultes * plafondTaxe);
        return taxe + taxe * tauxTaxeDepartementale;
    }

    function calculer() {
        const prixTTC2p = parseFloat(document.getElementById("prixTTC2p").value);
        const plateforme = document.getElementById("plateforme").value.toLowerCase();
        
        if (isNaN(prixTTC2p) || prixTTC2p <= 0) {
            alert("Veuillez entrer un prix TTC valide pour 2 personnes sans annulation.");
            return;
        }

        // Calculer le prix net pour 2 personnes sans annulation
        let prixNet2p = prixTTC2p / (1 + tauxTaxe + tauxTaxe * tauxTaxeDepartementale);

        // Calculer la taxe de séjour pour 2 personnes sans annulation
        let taxeSejour2p = prixNet2p * tauxTaxe;

        // Plafond taxe 2P
        if (taxeSejour2p >= 2 * plafondTaxe) {
            prixNet2p = prixTTC2p - (2 * plafondTaxe * (1 + tauxTaxeDepartementale));
        } else {
            prixNet2p = prixTTC2p / (1 + tauxTaxe + tauxTaxe * tauxTaxeDepartementale);
        }

        let prixNet4p = prixNet2p;
        let prixFinal;
        let details = "";

        // -------------------------
        //       BOOKING
        // -------------------------
        if (plateforme === "booking") {

            // Logique métier existante
            let prixNet2pAnnul = prixNet2p / 0.9;   // +10%
            let prixNet4pAnnul = prixNet2pAnnul / 0.85; // +15%

            prixFinal = prixNet4pAnnul;

            let taxe2p = taxeSejour(prixNet2p, 2);
            let taxe2pAnnul = taxeSejour(prixNet2pAnnul, 2);
            let taxe4p = taxeSejour(prixFinal, 4);
            let prixBrut2pAnnul = prixNet2pAnnul + taxe2pAnnul;

            const prixClientFinal = (prixNet2p + taxe2p);

            // 🔥 Commission Booking depuis pricing.json
            const commissionBooking = 0.17 ;

            // 🔥 Montant de la commission Booking
            let commissionBookingEuro = prixNet2p * (commissionBooking + 0.014) ;
            let commissionBookingEuroAnnul = prixNet2pAnnul * (commissionBooking + 0.014) ;

            // 🔥 Prix net SANS commission Booking
            let prixSansCommission = prixNet2p - commissionBookingEuro;
            let prixSansCommissionAnnul = prixNet2pAnnul - commissionBookingEuroAnnul;

            // -------------------------------------------------------
            // 🔥 AJOUT : Calcul du prix Airbnb équivalent Booking sans annulation
            // -------------------------------------------------------

            // Commission Airbnb depuis pricing.json
            const commissionHoteAirbnb = 0.03; // ex: 0.03
            const commissionVoyageur = 0.1605;

            // Coefficient Airbnb (ce que tu gardes après commission)
            const coefAirbnb = 1 - (commissionHoteAirbnb * 1.20);

            // Prix à entrer sur Airbnb pour toucher la même somme que Booking
            const prixAEntrerEquivalentAirbnb = prixSansCommission / coefAirbnb;

            // Taxe séjour Airbnb pour ce prix
            let taxeBruteEq = prixAEntrerEquivalentAirbnb * tauxTaxe;
            if (taxeBruteEq >= 2 * plafondTaxe) taxeBruteEq = 2 * plafondTaxe;
            let taxeEq = taxeBruteEq * (1 + tauxTaxeDepartementale);

            // Prix client final Airbnb
            let prixClientFinalAirbnbEq = (prixAEntrerEquivalentAirbnb + taxeEq) * (1 + commissionVoyageur);

            // -------------------------------------------------------
            // -------------------------------------------------------
            // 🔥 AJOUT : Calcul du prix Airbnb équivalent Booking avec annulation
            // -------------------------------------------------------



            // Prix à entrer sur Airbnb pour toucher la même somme que Booking
            const prixAEntrerEquivalentAirbnbAnnul = prixSansCommissionAnnul / coefAirbnb;

            // Taxe séjour Airbnb pour ce prix
            let taxeBruteEqAnnul = prixAEntrerEquivalentAirbnbAnnul * tauxTaxe;
            if (taxeBruteEqAnnul >= 2 * plafondTaxe) taxeBruteEqAnnul = 2 * plafondTaxe;
            let taxeEqAnnul = taxeBruteEqAnnul * (1 + tauxTaxeDepartementale);

            // Prix client final Airbnb
            let prixClientFinalAirbnbEqAnnul = (prixAEntrerEquivalentAirbnbAnnul + taxeEqAnnul) * (1 + commissionVoyageur);

            // -------------------------------------------------------

            // -------------------------------------------------------
            // 🔥 AJOUT : Trouver le prix Airbnb pour égaler le prix brut Booking
            // -------------------------------------------------------

            function prixAirbnbPourBrutCible(brutCible) {
                let guess = brutCible / (1 + commissionVoyageur); // première estimation

                for (let i = 0; i < 20; i++) {
                    let taxeBrute = guess * tauxTaxe;
                    if (taxeBrute >= 2 * plafondTaxe) taxeBrute = 2 * plafondTaxe;
                    let taxe = taxeBrute * (1 + tauxTaxeDepartementale);

                    let prixClient = (guess + taxe) * (1 + commissionVoyageur);

                    // ajustement
                    guess += (brutCible - prixClient) * 0.5;
                }

                return guess;
            }

            // Prix brut Booking sans annulation
            const prixBrutBooking = prixNet2p + taxe2p;

            // Prix brut Booking avec annulation
            const prixBrutBookingAnnul = prixNet2pAnnul + taxe2pAnnul;

            // Prix Airbnb équivalents
            const prixAEntrerAirbnbBrut = prixAirbnbPourBrutCible(prixBrutBooking);
            const prixAEntrerAirbnbBrutAnnul = prixAirbnbPourBrutCible(prixBrutBookingAnnul);

            // Prix client final Airbnb correspondants
            function prixClientAirbnb(prixAEntrer) {
                let taxeBrute = prixAEntrer * tauxTaxe;
                if (taxeBrute >= 2 * plafondTaxe) taxeBrute = 2 * plafondTaxe;
                let taxe = taxeBrute * (1 + tauxTaxeDepartementale);
                return (prixAEntrer + taxe) * (1 + commissionVoyageur);
            }

            const prixClientAirbnbBrut = prixClientAirbnb(prixAEntrerAirbnbBrut);
            const prixAEntrerAirbnbBrutArrondi = Math.ceil(prixAEntrerAirbnbBrut);
            const prixClientAirbnbBrutAnnul = prixClientAirbnb(prixAEntrerAirbnbBrutAnnul);
            const prixAEntrerAirbnbBrutAnnulArrondi = Math.ceil(prixAEntrerAirbnbBrutAnnul);

            let taxeBruteEqArrondi = prixAEntrerAirbnbBrutArrondi * tauxTaxe;
            if (taxeBruteEqArrondi >= 2 * plafondTaxe) taxeBruteEqArrondi = 2 * plafondTaxe;

            let taxeEqArrondi = taxeBruteEqArrondi * (1 + tauxTaxeDepartementale);

            let prixClientFinalAirbnbEqArrondi =
                (prixAEntrerAirbnbBrutArrondi + taxeEqArrondi) * (1 + commissionVoyageur);



            let taxeBruteEqAnnulArrondi = prixAEntrerAirbnbBrutAnnulArrondi * tauxTaxe;
            if (taxeBruteEqAnnulArrondi >= 2 * plafondTaxe) taxeBruteEqAnnulArrondi = 2 * plafondTaxe;

            let taxeEqAnnulArrondi = taxeBruteEqAnnulArrondi * (1 + tauxTaxeDepartementale);

            let prixClientFinalAirbnbEqAnnulArrondi =
                (prixAEntrerAirbnbBrutAnnulArrondi + taxeEqAnnulArrondi) * (1 + commissionVoyageur);

            
            details = `
                <h3>Détails Booking</h3>

                <p><strong>Prix net 2P (sans commission Booking) :</strong> 
                    €${prixSansCommission.toFixed(2)}</p>

                <p><strong>Commission Booking (${(commissionBooking*100).toFixed(0)}% + CB) :</strong> 
                    €${commissionBookingEuro.toFixed(2)}</p>

                <hr>

                <p>Prix net 2P (avec commission Booking) : €${prixNet2p.toFixed(2)}</p>
                <p>Taxe de séjour 2P : €${taxe2p.toFixed(2)}</p>

                <hr>

                <p>Prix net 2P avec annulation (/0.9) : €${prixNet2pAnnul.toFixed(2)}</p>
                <p>Taxe de séjour 2P : €${taxe2pAnnul.toFixed(2)}</p>
                <p>Prix brut 2P avec annulation (/0.9) : €${prixBrut2pAnnul.toFixed(2)}</p>
                <p>Prix net 4P avec annulation (/0.85) : €${prixNet4pAnnul.toFixed(2)}</p>
                <p>Taxe de séjour 4P : €${taxe4p.toFixed(2)}</p>

                <hr>

                <p><strong>Prix à entrer sous Booking :</strong> 
                    <span style="color: red; font-weight: bold;">€${prixNet4pAnnul.toFixed(2)}</span>
                </p>
                <hr>

                <p><strong>Prix client final (affiché sur Booking) :</strong> 
                    €${prixClientFinal.toFixed(2)}</p>
                
                <hr>                    

                <h4>➡️ Équivalent Airbnb (prix client BRUT identique à Booking)</h4>

                <p><strong>Avec annulation :</strong></p>
                <p>Prix brut Booking : €${prixBrutBookingAnnul.toFixed(2)}</p>
                <p>Prix à entrer sur Airbnb : <strong>€${prixAEntrerAirbnbBrutAnnul.toFixed(2)}</strong></p>
                <p>Prix à entrer sur Airbnb (Arrondi SUP): 
                    <span style="color: red; font-weight: bold;">€${prixAEntrerAirbnbBrutAnnulArrondi.toFixed(2)}</span>
                </p>
                <p>Prix client final Airbnb : €${prixClientAirbnbBrutAnnul.toFixed(2)}</p>
                <p><strong>Prix client final sur Airbnb (Arrondi SUP):</strong> 
                    €${prixClientFinalAirbnbEqAnnulArrondi.toFixed(2)}</p>    

                <hr>
                <p><strong>Sans annulation :</strong></p>
                <p>Prix brut Booking : €${prixBrutBooking.toFixed(2)}</p>
                <p>Prix à entrer sur Airbnb : <strong>€${prixAEntrerAirbnbBrut.toFixed(2)}</strong></p>
                <p>Prix à entrer sur Airbnb (Arrondi SUP) : 
                    <span style="color: orange; font-weight: bold;">€${prixAEntrerAirbnbBrutArrondi.toFixed(2)}</span>
                </p>
                <p>Prix client final Airbnb : €${prixClientAirbnbBrut.toFixed(2)}</p>
                <p><strong>Prix client final sur Airbnb (Arrondi SUP):</strong> 
                    €${prixClientFinalAirbnbEqArrondi.toFixed(2)}</p>
                    
                <hr>

                <h4>➡️ Équivalent Airbnb (prix Net reçu identique à Booking) </h4>
                <p><strong>Sans annulation :</strong></p>
                <p>Prix net souhaité (même que Booking) : €${prixSansCommission.toFixed(2)}</p>

                <p><strong>Prix à entrer sur Airbnb pour toucher la même somme :</strong> 
                    <span style="color: green; font-weight: bold;">€${prixAEntrerEquivalentAirbnb.toFixed(2)}</span>
                </p>

                <p><strong>Prix client final sur Airbnb :</strong> 
                    €${prixClientFinalAirbnbEq.toFixed(2)}</p>

                <hr>
                <p><strong>Avec annulation :</strong></p>
                <p>Prix net souhaité (même que Booking) : €${prixSansCommissionAnnul.toFixed(2)}</p>

                <p><strong>Prix à entrer sur Airbnb pour toucher la même somme :</strong> 
                    <span style="color: green; font-weight: bold;">€${prixAEntrerEquivalentAirbnbAnnul.toFixed(2)}</span>
                </p>

                <p><strong>Prix client final sur Airbnb :</strong> 
                    €${prixClientFinalAirbnbEqAnnul.toFixed(2)}</p>                    




            `;
        }


        // -------------------------
        //        AIRBNB (2P)
        // -------------------------
        if (plateforme === "airbnb") {

            // Commission hôte depuis pricing.json
            const commissionHote = CONFIG.plateformes["AirBnb"].commission[VILLE];   // ex: 0.03
            const commissionVoyageur = 0.1605; // tu gardes ta valeur réelle Airbnb TTC

            const prixClient2p = prixTTC2p;
            const prixHote2pTTC = prixClient2p / (1 + commissionVoyageur);

            let prixNet2pAirbnb = prixHote2pTTC / (1 + tauxTaxe + tauxTaxe * tauxTaxeDepartementale);

            let taxeSejour2pAirbnb = prixNet2pAirbnb * tauxTaxe;
            if (taxeSejour2pAirbnb >= 2 * plafondTaxe) {
                prixNet2pAirbnb = prixHote2pTTC - (2 * plafondTaxe * (1 + tauxTaxeDepartementale));
            }

            const prixAEntrerSup = Math.ceil(prixNet2pAirbnb);
            let taxeBruteSup = prixAEntrerSup * tauxTaxe;
            if (taxeBruteSup >= 2 * plafondTaxe) taxeBruteSup = 2 * plafondTaxe;
            const taxeSup = taxeBruteSup * (1 + tauxTaxeDepartementale);
            const commissionHoteSup = prixAEntrerSup * commissionHote * 1.20;
            const prixClientFinalSup = (prixAEntrerSup + taxeSup) * (1 + commissionVoyageur);
            const prixSansCommissionSup = prixAEntrerSup - commissionHoteSup;

            const prixAEntrerInf = Math.floor(prixNet2pAirbnb);
            let taxeBruteInf = prixAEntrerInf * tauxTaxe;
            if (taxeBruteInf >= 2 * plafondTaxe) taxeBruteInf = 2 * plafondTaxe;
            const taxeInf = taxeBruteInf * (1 + tauxTaxeDepartementale);
            const commissionHoteInf = prixAEntrerInf * commissionHote * 1.20;
            const prixClientFinalInf = (prixAEntrerInf + taxeInf) * (1 + commissionVoyageur);
            const prixSansCommissionInf = prixAEntrerInf - commissionHoteInf;

            details = `
                <h3>Détails Airbnb</h3>

                <p><strong>Prix client saisi (2P) :</strong> €${prixClient2p.toFixed(2)}</p>
                <p><strong>Prix net hôte (avant arrondi) :</strong> €${prixNet2pAirbnb.toFixed(2)}</p>

                <hr>

                <h4>➡️ Option 1 : Arrondi supérieur</h4>
                <p>Prix à entrer : <strong>${prixAEntrerSup} €</strong></p>
                <p>Taxe séjour : €${taxeSup.toFixed(2)}</p>
                <p>Commission hôte : €${commissionHoteSup.toFixed(2)}</p>
                <p>Prix sans commission : €${prixSansCommissionSup.toFixed(2)}</p>
                <p><strong>Prix client final :</strong> €${prixClientFinalSup.toFixed(2)}</p>

                <hr>

                <h4>➡️ Option 2 : Arrondi inférieur</h4>
                <p>Prix à entrer : <strong>${prixAEntrerInf} €</strong></p>
                <p>Taxe séjour : €${taxeInf.toFixed(2)}</p>
                <p>Commission hôte : €${commissionHoteInf.toFixed(2)}</p>
                <p>Prix sans commission : €${prixSansCommissionInf.toFixed(2)}</p>
                <p><strong>Prix client final :</strong> €${prixClientFinalInf.toFixed(2)}</p>
            `;
        }

        // -------------------------
        //        DIRECT (2P)
        // -------------------------
        if (plateforme === "direct") {

            let taxe2p = taxeSejour(prixNet4p, 2);
            prixFinal = prixNet4p + taxe2p;

            details = `
                <h3>Détails Direct</h3>
                <p><strong>Prix net hôte (2P) => Prix à entrer sous Direct :</strong>
                    <span class="highlight">€${prixNet4p.toFixed(2)}</span>
                </p>
                <p>Taxe de séjour 2P : €${taxe2p.toFixed(2)}</p>
                <hr>
                <p>Aucune commission appliquée.</p>
                <p><strong>Prix client final (affiché direct):</strong> €${prixFinal.toFixed(2)}</p>                
            `;
        }

        document.getElementById("result").innerHTML = `
            <hr>
            ${details}
        `;
    }
</script>

</body>
</html>
